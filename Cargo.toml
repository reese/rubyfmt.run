[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "94566e5dfc23d4dbcf73bf643313612392920038", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
