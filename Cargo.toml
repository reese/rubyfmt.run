[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "5ab47fc39ce52a88c4f5a022c83dc078a070e06e", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
