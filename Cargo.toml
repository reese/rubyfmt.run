[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "ab5ed7ea9f3252e39e66525bffcd0abe12b3ef79", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
