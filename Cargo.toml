[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "8ad8723afba09c92df334558d7619ce15b05308e", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
