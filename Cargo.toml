[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "6922c68ed2a4778a2050aac7cb0263627039acf8", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
