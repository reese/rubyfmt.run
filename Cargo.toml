[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "1d7e9c18f435bfd8d77e5a1ac194ab787e5c096a", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
