[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "b7189640e5fcf49243046a9730f8c4a8071e7561", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
