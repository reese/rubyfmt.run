[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "ac564aef279c390f03a815574b452ce3646ac10a", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
