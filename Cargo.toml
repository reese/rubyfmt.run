[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "95833f07b1275803dfaa9cdfb75454619eb38821", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
