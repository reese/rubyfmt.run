[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "057d63d32ce86ad8eecb0b534de3032e8db98e56", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
