[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "d818f5275c847c5bd221d0235cf18ec158532783", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
