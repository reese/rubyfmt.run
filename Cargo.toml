[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "95210d780317a4920ac6aae9c0a7d5730c0739d1", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
