[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "b2bcdc94cdb557a7e54b9911b74ec1a004778bcd", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
