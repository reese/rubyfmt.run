[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "05afb6d8913fe634f4eaa1c20bcb579f5272b2a9", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
