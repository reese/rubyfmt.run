[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "9853befce720a46b381d2f13177debd149dfc80b", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
