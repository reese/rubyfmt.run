[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "c031d6b2c2888867d69a04da020adb5d814d956a", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
