[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "6b748fcc95e2b2690bc52ee9da4bd4b8c9f9bcee", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
