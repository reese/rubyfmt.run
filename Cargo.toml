[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "f9fdbf1e1735cedbe676facc7f890c1def9f223f", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
