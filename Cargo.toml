[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "b2a11b66ef187daf0406ce04747346289b8c57e7", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
