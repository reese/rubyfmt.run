[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "f9208d41e00271e3064c795832630bfe0792944c", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
