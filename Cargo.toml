[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "25bc06a56318221f62f1c30d3674288ef1c1b2b1", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
