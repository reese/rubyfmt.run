[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "4f7d5f33953eddc3bc56eeb1affd07faf3e0ffaa", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
