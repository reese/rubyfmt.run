[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "8991bc906fc07dba3382d6dee1c8ba3008bd87cb", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
