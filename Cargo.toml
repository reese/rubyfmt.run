[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "1be913684df5d3224e3fc196d0bad5897d56b334", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
