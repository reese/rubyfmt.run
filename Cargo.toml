[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "a0ebab0cfae44343b253814563ab6ffc39ab0d26", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
