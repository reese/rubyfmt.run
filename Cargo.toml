[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "c3e462a548765d3dac51d19ea51337dbec5d79c2", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
