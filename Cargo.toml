[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "a793d3b39eecb5944c890a04d62bfef41ba25f8d", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
