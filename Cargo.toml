[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "2011ed480649cfbada8a94a15a67f70e17eb06b9", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
