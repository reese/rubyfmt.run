[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "c3594123b585b0b9a20eaa5d8f9bd09cd644660d", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
