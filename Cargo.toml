[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "c891abd9c42bc4ac266b090b06db24991734f99e", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
