[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "ae2e8bc7a0a9509d74fd894636748525d1091495", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
