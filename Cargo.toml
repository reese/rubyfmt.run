[package]
name = "rubyfmt-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
rubyfmt = { git = "https://github.com/fables-tales/rubyfmt", rev = "0571ee54b6854e0c2f6f0c83edbf177a7ffbc1ef", default-features = false }

[profile.release]
opt-level = 'z'
lto = true
codegen-units = 1
strip = true
